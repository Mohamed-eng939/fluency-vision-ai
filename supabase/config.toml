[functions.audio-processor]
# DRAFT: was false. Previously left OUT of the safe-to-flip set because
# src/services/audioService.ts calls this function unconditionally with no
# auth-state check, and it's the function that handles audio uploads for
# the anonymous/guest test-taking flow — flipping to true would have 401'd
# every guest upload before the function even ran.
#
# Superseded by 20260627000001_guest_auth_hardening.sql: guests now get a
# real Supabase anonymous sign-in (auth.signInAnonymously()) via
# ensureAuthSession() in sessionService.ts, called from initializeSession()
# before a session/assessmentId exists at all. supabase.functions.invoke()
# auto-attaches that session's access_token, so audioService.ts needs no
# changes — it already sends a real (anonymous) JWT once that migration's
# app-side code is live. Apply this flip ONLY together with, and after,
# that migration — flipping it first (anonymous sign-ins not yet enabled,
# or the old code without ensureAuthSession deployed) would break guest
# audio upload exactly as originally feared.
verify_jwt = true

[functions.profile-manager]
# Called via supabase.functions.invoke() from profileService.ts only from
